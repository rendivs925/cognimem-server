<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogniMem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { {{CSS_VARS}} }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--fg); }
        .font-mono { font-family: 'JetBrains Mono', monospace !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .animate-fade-in { animation: fadeIn 0.25s ease-out both; }
        .animate-slide-in { animation: slideIn 0.2s ease-out both; }
        .animate-scale-in { animation: scaleIn 0.2s ease-out both; }
        .animate-pulse { animation: pulse 1.5s ease-in-out infinite; }
        .animate-stagger > * { animation: fadeIn 0.25s ease-out both; }
        .animate-stagger > *:nth-child(1) { animation-delay: 0.02s; }
        .animate-stagger > *:nth-child(2) { animation-delay: 0.04s; }
        .animate-stagger > *:nth-child(3) { animation-delay: 0.06s; }
        .animate-stagger > *:nth-child(4) { animation-delay: 0.08s; }
        .animate-stagger > *:nth-child(5) { animation-delay: 0.10s; }
        .animate-stagger > *:nth-child(6) { animation-delay: 0.12s; }
        .animate-stagger > *:nth-child(7) { animation-delay: 0.14s; }
        .animate-stagger > *:nth-child(8) { animation-delay: 0.16s; }
        .animate-stagger > *:nth-child(9) { animation-delay: 0.18s; }
        .animate-stagger > *:nth-child(10) { animation-delay: 0.20s; }

        .skeleton { background: linear-gradient(90deg, var(--hover) 25%, var(--border) 50%, var(--hover) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius); }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; }
        .card-body { padding: 0; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: all 0.2s ease; }
        .stat-card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .stat-value { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--accent); }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.5; margin-top: 8px; }
        .list-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; cursor: pointer; transition: background 0.1s ease; }
        .list-item:hover { background: var(--hover); }
        .list-item:active { background: var(--active-bg); }
        .tier-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .tier-bar-label { width: 90px; font-size: 13px; }
        .tier-bar-track { flex: 1; height: 8px; background: var(--hover); border-radius: 4px; overflow: hidden; }
        .tier-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s ease; }
        .tier-bar-value { width: 32px; text-align: right; font-size: 13px; font-family: 'JetBrains Mono', monospace; }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; letter-spacing: 0.3px; transition: all 0.15s ease; }
        .badge-sensory { background: rgba(15, 197, 237, 0.15); color: #0FC5ED; }
        .badge-working { background: rgba(162, 119, 255, 0.15); color: #a277ff; }
        .badge-episodic { background: rgba(71, 255, 156, 0.15); color: #47FF9C; }
        .badge-semantic { background: rgba(255, 224, 115, 0.15); color: #FFE073; }
        .badge-procedural { background: rgba(229, 46, 46, 0.15); color: #E52E2E; }

        .nav-item { cursor: pointer; border-radius: 6px; transition: all 0.15s ease; }
        .nav-item:hover { background: var(--hover); }
        .nav-item.active { background: var(--active-bg); color: var(--accent); }
        .nav-item:active { transform: scale(0.98); }

        tr[data-id] { cursor: pointer; transition: background 0.1s ease; }
        tr[data-id]:hover { background: var(--hover); }
        tr[data-id]:active { background: var(--active-bg); }

        .tree-item { cursor: pointer; border-radius: 6px; transition: all 0.12s ease; }
        .tree-item:hover { background: var(--hover); }
        .tree-item.selected { background: var(--active-bg); color: var(--accent); }
        .tree-item:active { transform: scale(0.98); }

        .tree-arrow { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; font-size: 10px; transition: transform 0.2s ease; opacity: 0.5; }
        .tree-arrow.open { transform: rotate(90deg); }
        .tree-children { padding-left: 20px; display: none; }
        .tree-children.open { display: block; animation: slideIn 0.15s ease-out; }

        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

        .badge { transition: all 0.15s ease; }

        .modal-open { animation: scaleIn 0.2s ease-out; }

        .btn { transition: all 0.15s ease; cursor: pointer; }
        .btn:hover { opacity: 0.85; transform: translateY(-0.5px); }
        .btn:active { transform: scale(0.97); }

        input, select, textarea { transition: border-color 0.15s ease, box-shadow 0.15s ease; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent) !important; box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent); }

        .node-item { transition: background 0.12s ease; cursor: default; }
        .node-item:hover { background: var(--hover); }
    </style>
</head>
<body class="h-full">
    <div class="flex h-screen overflow-hidden">
        <aside class="flex-shrink-0 border-r flex flex-col" style="width:var(--sidebar-width);background:var(--sidebar-bg);border-color:var(--border)">
            <div class="px-4 pt-6 pb-8 text-lg font-bold tracking-tight select-none">CogniMem</div>
            <nav class="flex-1 px-3 space-y-0.5" id="nav">
                <div class="text-[10px] uppercase tracking-widest opacity-40 px-3 pt-4 pb-1.5 select-none">Core</div>
                <div class="nav-item active" data-view="memories" onclick="switchView('memories')">
                    <span class="text-sm">Memories</span>
                </div>
                <div class="nav-item" data-view="codegraph" onclick="switchView('codegraph')">
                    <span class="text-sm">Code Graph</span>
                </div>
                <div class="nav-item" data-view="search" onclick="switchView('search')">
                    <span class="text-sm">Search</span>
                </div>
                <div class="text-[10px] uppercase tracking-widest opacity-40 px-3 pt-4 pb-1.5 select-none">Analysis</div>
                <div class="nav-item" data-view="stats" onclick="switchView('stats')">
                    <span class="text-sm">Statistics</span>
                </div>
                <div class="nav-item" data-view="skills" onclick="switchView('skills')">
                    <span class="text-sm">Skills</span>
                </div>
                <div class="nav-item" data-view="persona" onclick="switchView('persona')">
                    <span class="text-sm">Persona</span>
                </div>
                <div class="text-[10px] uppercase tracking-widest opacity-40 px-3 pt-4 pb-1.5 select-none">Workflows</div>
                <div class="nav-item" data-view="work" onclick="switchView('work')">
                    <span class="text-sm">Work Items</span>
                </div>
                <div class="nav-item" data-view="timeline" onclick="switchView('timeline')">
                    <span class="text-sm">Timeline</span>
                </div>
            </nav>
        </aside>
        <main class="flex-1 overflow-y-auto p-8" id="main">
            <div id="page-title" class="text-2xl font-semibold mb-1"></div>
            <div id="page-subtitle" class="text-sm opacity-50 mb-6"></div>
            <div id="toolbar" class="flex gap-3 mb-5 items-center"></div>
            <div id="content" class="animate-fade-in"></div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/75 hidden items-center justify-center z-50 transition-opacity duration-200" onclick="closeModal()">
        <div class="rounded-xl border max-w-lg w-11/12 max-h-[80vh] overflow-y-auto p-6 modal-open" style="background:var(--surface);border-color:var(--border)" onclick="event.stopPropagation()">
            <div id="modal-content"></div>
        </div>
    </div>

    <div id="add-modal" class="fixed inset-0 bg-black/75 hidden items-center justify-center z-50 transition-opacity duration-200" onclick="document.getElementById('add-modal').classList.add('hidden')">
        <div class="rounded-xl border max-w-lg w-11/12 p-6 modal-open" style="background:var(--surface);border-color:var(--border)" onclick="event.stopPropagation()">
            <h3 class="text-lg font-semibold mb-4">New Memory</h3>
            <textarea id="new-memory-content" rows="4" class="w-full rounded-lg border px-3 py-2 text-sm mb-3" style="background:var(--hover);border-color:var(--border);color:var(--fg)" placeholder="Memory content..."></textarea>
            <select id="new-memory-tier" class="w-full rounded-lg border px-3 py-2 text-sm mb-4" style="background:var(--hover);border-color:var(--border);color:var(--fg)">
                <option value="sensory">Sensory</option>
                <option value="working">Working</option>
                <option value="episodic" selected>Episodic</option>
                <option value="semantic">Semantic</option>
                <option value="procedural">Procedural</option>
            </select>
            <button onclick="addMemory()" class="px-4 py-2 rounded-lg text-sm font-semibold border-0 cursor-pointer btn" style="background:var(--accent);color:var(--bg)">Save</button>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
