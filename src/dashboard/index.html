<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>{{CSS}}</style>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="logo">{{LOGO}}</div>
            <div class="nav">
                <a class="nav-item {{ACTIVE_MEM}}" hx-get="/api/memories" hx-target="#content" hx-swap="innerHTML">{{NAV_MEMORIES}}</a>
                <a class="nav-item {{ACTIVE_GRAPH}}" hx-get="/api/graph" hx-target="#content" hx-swap="innerHTML">{{NAV_CODEGRAPH}}</a>
                <a class="nav-item {{ACTIVE_STATS}}" hx-get="/api/stats" hx-target="#stats" hx-swap="innerHTML">{{NAV_STATS}}</a>
            </div>
        </div>
        <div class="main">
            <div class="title">{{MAIN_TITLE}}</div>
            <div class="subtitle">{{MAIN_SUBTITLE}}</div>
            <div id="stats" class="stats" hx-get="/api/stats" hx-trigger="load">{{STATS}}</div>
            <div class="card">
                <div class="card-header">{{CARD_HEADER}}</div>
                <div hx-get="/api/memories" hx-trigger="load">{{CONTENT}}</div>
            </div>
        </div>
    </div>
</body>
</html>
