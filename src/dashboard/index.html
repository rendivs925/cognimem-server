<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        function setActive(link) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            link.classList.add('active');
        }
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.nav-item').forEach(link => {
                link.addEventListener('click', () => setActive(link));
            });
        });
    </script>
    <style>{{CSS}}</style>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="logo">{{LOGO}}</div>
            <div class="nav">
                <a class="nav-item" hx-get="/api/memories" hx-target="#content">Memories</a>
                <a class="nav-item" hx-get="/api/graph" hx-target="#content">Code Graph</a>
                <a class="nav-item" hx-get="/api/stats" hx-target="#content">Stats</a>
            </div>
        </div>
        <div class="main">
            <div class="title">{{MAIN_TITLE}}</div>
            <div class="subtitle">{{MAIN_SUBTITLE}}</div>
            <div class="card">
                <div class="card-header" id="card-header">Memories</div>
                <div id="content" hx-get="/api/memories" hx-trigger="load"></div>
            </div>
        </div>
    </div>
</body>
</html>
