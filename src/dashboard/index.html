<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogniMem</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #011423;
            --fg: #CBE0F0;
            --accent: #47FF9C;
            --primary: #0FC5ED;
            --muted: #214969;
            --warning: #FFE073;
            --success: #44FFB1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.6;
            min-height: 100vh;
        }
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, rgba(33,73,105,0.3), rgba(1,20,35,0.8));
            border-right: 1px solid var(--muted);
            padding: 24px 16px;
        }
        .logo { font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 32px; }
        .logo span { color: var(--primary); }
        .nav { display: flex; flex-direction: column; gap: 4px; }
        .nav-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            text-decoration: none;
            color: var(--fg);
            display: block;
        }
        .nav-item:hover { background: rgba(33,73,105,0.3); }
        .nav-item.active {
            background: linear-gradient(90deg, rgba(71,255,156,0.15), transparent);
            color: var(--accent);
            border-left: 2px solid var(--accent);
        }
        .main { flex: 1; padding: 32px; }
        .title { font-size: 28px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { font-size: 14px; opacity: 0.6; margin-bottom: 24px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
        .stat-card {
            background: linear-gradient(135deg, rgba(33,73,105,0.2), rgba(1,20,35,0.4));
            border: 1px solid var(--muted);
            border-radius: 16px;
            padding: 24px;
        }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
        .stat-label { font-size: 12px; opacity: 0.6; text-transform: uppercase; margin-top: 8px; }
        .card {
            background: linear-gradient(135deg, rgba(33,73,105,0.15), rgba(1,20,35,0.3));
            border: 1px solid var(--muted);
            border-radius: 16px;
            overflow: hidden;
        }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--muted); font-weight: 600; }
        .table { width: 100%; border-collapse: collapse; }
        .table th { padding: 16px 24px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; border-bottom: 1px solid var(--muted); }
        .table td { padding: 16px 24px; border-bottom: 1px solid rgba(33,73,105,0.3); }
        .table tr:hover { background: rgba(33,73,105,0.2); }
        .tier { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
        .tier-sensory { background: rgba(15,197,237,0.2); color: #0FC5ED; }
        .tier-working { background: rgba(162,119,255,0.2); color: #a277ff; }
        .tier-episodic { background: rgba(71,255,156,0.2); color: #47FF9C; }
        .tier-semantic { background: rgba(255,224,115,0.2); color: #FFE073; }
        .tier-procedural { background: rgba(229,46,46,0.2); color: #E52E2E; }
        .metric { font-family: 'JetBrains Mono', monospace; }
        .empty { padding: 48px; text-align: center; opacity: 0.5; }
        code { font-family: 'JetBrains Mono', monospace; background: rgba(33,73,105,0.3); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="logo">Cogni<span>Mem</span></div>
            <div class="nav">
                <a class="nav-item active" hx-get="/api/memories" hx-target="#content" hx-swap="innerHTML">Memories</a>
                <a class="nav-item" hx-get="/api/graph" hx-target="#content" hx-swap="innerHTML">Code Graph</a>
                <a class="nav-item" hx-get="/api/stats" hx-target="#stats" hx-swap="innerHTML">Stats</a>
            </div>
        </div>
        <div class="main">
            <div class="title">Dashboard</div>
            <div class="subtitle">Cognitive Memory System</div>
            <div id="stats" class="stats" hx-get="/api/stats" hx-trigger="load"></div>
            <div class="card">
                <div class="card-header">Memories</div>
                <div hx-get="/api/memories" hx-trigger="load"></div>
            </div>
        </div>
    </div>
</body>
</html>
