[package]
name = "cognimem-server"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
chrono = "0.4.44"
rmcp = { version = "1.5.0", features = ["server", "schemars", "macros", "transport-io"] }
petgraph = "0.8.3"
rand = "0.10.1"
rocksdb = "0.24.0"
serde = "1.0.228"
serde_json = "1.0.149"
tokio = { version = "1.52.1", features = ["rt-multi-thread", "macros"] }
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
uuid = { version = "1.23.1", features = ["serde", "v4"] }
